# ========================================
# HARDWARE CONFIGURATION
# ========================================
# NFC pins as GPIO (for nRF52 boards)
CONFIG_NFCT_PINS_AS_GPIOS=y

# Rotary encoder support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# SPI interface
CONFIG_SPI=y

# ========================================
# CIRQUE TRACKPAD CONFIGURATION
# ========================================
CONFIG_ZMK_POINTING=y
CONFIG_INPUT_PINNACLE=y
CONFIG_ZMK_INPUT_PINNACLE_IDLE_SLEEPER=y

# Optional: Stack size adjustments
# CONFIG_MAIN_STACK_SIZE=4096
# CONFIG_INPUT_THREAD_STACK_SIZE=4096

# ========================================
# POWER MANAGEMENT
# ========================================
CONFIG_ZMK_SLEEP=y
# Idle timeout: 5 minutes
CONFIG_ZMK_IDLE_TIMEOUT=300000
# Sleep timeout: 1 hour
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# ========================================
# BLUETOOTH CONFIGURATION
# ========================================
# Battery Service
CONFIG_BT_BAS=y
# TX Power: +8dBm
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Battery reporting
CONFIG_ZMK_BATTERY_REPORTING=y

# Split keyboard battery (keep if using split features)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# ========================================
# RGB LED WIDGET
# ========================================
# Battery level thresholds
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
# Show layer changes
CONFIG_RGBLED_WIDGET_SHOW_LAYER_CHANGE=y

# ========================================
# ZMK STUDIO
# ========================================
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# ========================================
# PROSPECTOR SCANNER INTEGRATION
# ========================================
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="lalapad"

# ========================================
# POWER OPTIMIZATION (v1.1.1)
# ========================================
CONFIG_ZMK_STATUS_ADV_ACTIVITY_BASED=y

# Active: 10Hz when typing
CONFIG_ZMK_STATUS_ADV_ACTIVE_INTERVAL_MS=100
# Idle: 0.03Hz when idle
CONFIG_ZMK_STATUS_ADV_IDLE_INTERVAL_MS=30000
# Switch to idle mode after 10 seconds
CONFIG_ZMK_STATUS_ADV_ACTIVITY_TIMEOUT_MS=10000

# ========================================
# DISPLAY CUSTOMIZATION
# ========================================
# Adjust layer display (0-6 = 7 layers)
CONFIG_PROSPECTOR_MAX_LAYERS=7

# Optional: Stop advertisements in deep sleep
# CONFIG_ZMK_STATUS_ADV_STOP_ON_SLEEP=y

# ========================================
# WPM TRACKING (v1.1.1)
# ========================================
# Balanced: 30s window (default)
# CONFIG_ZMK_STATUS_ADV_WPM_WINDOW_SECONDS=30

# ========================================
# DEBUGGING (Development Only)
# ========================================
# Enable for debugging
# CONFIG_INPUT_LOG_LEVEL_DBG=y
# CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=3000
